name: VVV semanal - on-chain, produto e dev

on:
  schedule:
    # 06:00 de Brasília = 09:00 UTC, toda segunda-feira
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

jobs:
  rodar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Rodar a tarefa semanal (on-chain)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/rodar_tarefa.py on-chain-produto-e-dev
      - name: Salvar o relatório no repositório
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Relatório semanal automático (on-chain, produto e dev)"
          git push
