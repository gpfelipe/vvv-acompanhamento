name: VVV semanal - terceiros (upstream)

on:
  schedule:
    # 06:06 de Brasília = 09:06 UTC, toda segunda-feira
    - cron: "6 9 * * 1"
  workflow_dispatch: {}

jobs:
  rodar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Rodar a tarefa semanal (terceiros)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/rodar_tarefa.py terceiros-upstream
      - name: Salvar o relatório no repositório
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Relatório semanal automático (terceiros upstream)"
          git push
